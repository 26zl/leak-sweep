name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  github-release:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
      - run: python -m pip install --require-hashes -r requirements-dev.lock
      - name: Verify tag matches package version
        run: test "v$(python -c 'import sweep; print(sweep.__version__)')" = "$GITHUB_REF_NAME"
      - run: ruff check .
      - run: pyright --pythonpath "$(command -v python)"
      - run: python -m unittest discover -s tests -v
      - run: pip-audit --require-hashes -r requirements.lock
      - run: pip-licenses
      - run: python -m build --no-isolation
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" dist/* --generate-notes --verify-tag
